# Local dev stack for the fraud pipeline. Run from repo root:
#   docker compose -f docker/docker-compose.yml up
# Producer is opt-in (profile "replay"):
#   docker compose -f docker/docker-compose.yml --profile replay up producer
#
# Contexts are `..` (repo root) so Dockerfiles can COPY src/, contracts/, etc.
name: fraud-pipeline

x-pipeline-env: &pipeline-env
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_SECURITY_PROTOCOL: PLAINTEXT
  KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
  KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
  KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
  KAFKA_TOPIC_TRANSACTIONS: ${KAFKA_TOPIC_TRANSACTIONS:-transactions}
  KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-transactions.dlq}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  DELTA_ROOT: /app/data/delta
  TOKENIZATION_SALT: ${TOKENIZATION_SALT:-change-me-local-only}
  PRODUCER_EVENTS_PER_SEC: ${PRODUCER_EVENTS_PER_SEC:-200}
  PRODUCER_INPUT_CSV: ${PRODUCER_INPUT_CSV:-data/sample/transactions_sample.csv}

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  spark-features:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: spark-features
    command: ["src.pipeline.features", "--run-stream"]
    environment:
      <<: *pipeline-env
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../models:/app/models

  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: producer
    profiles: ["replay"]
    command:
      [
        "src.pipeline.ingestion",
        "--input", "data/sample/transactions_sample.csv",
      ]
    environment:
      <<: *pipeline-env
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_DIR: /app/models
      SCORE_THRESHOLD_PATH: /app/models/threshold.json
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../models:/app/models

  # Core-banking system-of-record (ticket 06). Azure SQL Edge is the
  # ARM-native SQL Server-compatible image (Docker Desktop/Colima on Apple
  # Silicon can't run full mssql-server). Opt-in via the "demo" profile since
  # it isn't part of the v1.0 streaming path.
  bank-db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: bank-db
    profiles: ["demo"]
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: ${BANK_DB_PASSWORD:-LocalDev!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - bank-db-data:/var/opt/mssql
    healthcheck:
      # azure-sql-edge ships no sqlcmd/mssql-tools; the image *does* have bash,
      # so probe port 1433 with bash's /dev/tcp pseudo-device instead of
      # installing anything extra. This only proves the TCP listener is up
      # (not "accepting logins"), which is why start_period is generous and
      # init-bank/seed.py retries via SQLAlchemy's pool_pre_ping regardless.
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1433' || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # One-shot: apply schema.sql + seed bank.customers/accounts/cards, then exit.
  # Reuses the pipeline image (pymssql/sqlalchemy/faker added to requirements.txt).
  init-bank:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: init-bank
    profiles: ["demo"]
    command: ["src.bank.seed", "--input", "data/sample/transactions_sample.csv"]
    environment:
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:-LocalDev!Passw0rd}
      BANK_DB_NAME: ${BANK_DB_NAME:-master}
      TOKENIZATION_SALT: ${TOKENIZATION_SALT:-change-me-local-only}
    depends_on:
      bank-db:
        condition: service_healthy
    volumes:
      - ../data:/app/data

volumes:
  bank-db-data:
