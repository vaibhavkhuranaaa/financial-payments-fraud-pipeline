# Local dev stack for the fraud pipeline. Run from repo root:
#   docker compose -f docker/docker-compose.yml --env-file docker/demo.env up
# Producer is opt-in (profile "replay"):
#   docker compose -f docker/docker-compose.yml --env-file docker/demo.env --profile replay up producer
#
# Contexts are `..` (repo root) so Dockerfiles can COPY src/, contracts/, etc.
# --env-file supplies the demo-only secrets in docker/demo.env — see
# docs/governance/security-posture.md.
name: fraud-pipeline

# Ticket 14: secrets have no inline `:-default` fallback left in this file —
# `${VAR:?msg}` fails `docker compose config` loudly instead of silently
# defaulting. `docker/demo.env` (committed, demo-only) supplies the values
# for local dev via `--env-file docker/demo.env` (Makefile/scripts/demo.sh)
# and via each secret-using service's `env_file:` below.
x-demo-env-file: &demo-env-file
  - demo.env

x-pipeline-env: &pipeline-env
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_SECURITY_PROTOCOL: PLAINTEXT
  KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
  KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
  KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
  KAFKA_TOPIC_TRANSACTIONS: ${KAFKA_TOPIC_TRANSACTIONS:-transactions}
  KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-transactions.dlq}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  DELTA_ROOT: /app/data/delta
  TOKENIZATION_SALT: ${TOKENIZATION_SALT:?TOKENIZATION_SALT is required (see docker/demo.env for local dev)}
  PRODUCER_EVENTS_PER_SEC: ${PRODUCER_EVENTS_PER_SEC:-200}
  PRODUCER_INPUT_CSV: ${PRODUCER_INPUT_CSV:-data/sample/transactions_sample.csv}

services:
  redpanda:
    # Digest-pinned (ticket 14); tag kept here for human reference: v24.2.4
    image: redpandadata/redpanda@sha256:9b91885f3add2d9033724fad39f9dda3b0adda8084edcb57aa08d21f2868b6b6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  spark-features:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: spark-features
    command: ["src.pipeline.features", "--run-stream"]
    env_file: *demo-env-file
    environment:
      <<: *pipeline-env
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data
      - ../models:/app/models

  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: producer
    profiles: ["replay"]
    command:
      [
        "src.pipeline.ingestion",
        "--input", "data/sample/transactions_sample.csv",
      ]
    env_file: *demo-env-file
    environment:
      <<: *pipeline-env
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_DIR: /app/models
      SCORE_THRESHOLD_PATH: /app/models/threshold.json
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../models:/app/models

  # Core-banking system-of-record (ticket 06). Azure SQL Edge is the
  # ARM-native SQL Server-compatible image (Docker Desktop/Colima on Apple
  # Silicon can't run full mssql-server). Opt-in via the "demo" profile since
  # it isn't part of the v1.0 streaming path.
  bank-db:
    # Digest-pinned (ticket 14); tag kept here for human reference: latest
    image: mcr.microsoft.com/azure-sql-edge@sha256:902628a8be89e35dfb7895ca31d602974c7bafde4d583a0d0873844feb1c42cf
    container_name: bank-db
    profiles: ["demo"]
    env_file: *demo-env-file
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
    ports:
      - "1433:1433"
    # Compose's default 10s SIGTERM grace is not enough for SQL Edge to
    # checkpoint and shut down cleanly under write load; a SIGKILL mid-write
    # can leave the demo DB SUSPECT on the persisted volume (found live
    # 2026-07-19 — bootstrap_database() also self-heals that case by
    # dropping/recreating the disposable demo DB).
    stop_grace_period: 90s
    volumes:
      - bank-db-data:/var/opt/mssql
    healthcheck:
      # azure-sql-edge ships no sqlcmd/mssql-tools; the image *does* have bash,
      # so probe port 1433 with bash's /dev/tcp pseudo-device instead of
      # installing anything extra. This only proves the TCP listener is up
      # (not "accepting logins"), which is why start_period is generous and
      # init-bank/seed.py retries via SQLAlchemy's pool_pre_ping regardless.
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1433' || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # One-shot: apply schema.sql + seed bank.customers/accounts/cards, then exit.
  # Reuses the pipeline image (pymssql/sqlalchemy/faker added to requirements.txt).
  init-bank:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: init-bank
    profiles: ["demo"]
    command: ["src.bank.seed", "--input", "data/sample/transactions_sample.csv"]
    env_file: *demo-env-file
    environment:
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
      TOKENIZATION_SALT: ${TOKENIZATION_SALT:?TOKENIZATION_SALT is required (see docker/demo.env for local dev)}
    depends_on:
      bank-db:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  # Live scorer loop (ticket 07): consumes `transactions`, POSTs each event to
  # the api's /score, writes bank.scored_transactions/fraud_alerts. Closes the
  # demo loop so the dashboard (ticket 08) goes live with zero manual steps.
  scorer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: scorer
    profiles: ["demo"]
    command: ["src.pipeline.scorer"]
    env_file: *demo-env-file
    environment:
      <<: *pipeline-env
      SCORE_URL: ${SCORE_URL:-http://api:8000/score}
      ALERT_THRESHOLD: ${ALERT_THRESHOLD:-}
      SCORER_MAX_EVENTS: ${SCORER_MAX_EVENTS:-}
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
    depends_on:
      api:
        condition: service_started
      bank-db:
        condition: service_healthy
      init-bank:
        condition: service_completed_successfully

  # Fraud-ops dashboard (ticket 08): Plotly Dash, reads bank-db + api's
  # /metrics + models/metrics.json. API is a soft dependency (metrics tile
  # just shows a waiting state if it's down), so only bank-db is a hard
  # `depends_on` condition.
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: dashboard
    profiles: ["demo"]
    ports:
      - "${DASHBOARD_PORT:-8050}:8050"
    env_file: *demo-env-file
    environment:
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
      API_METRICS_URL: ${API_METRICS_URL:-http://api:8000/metrics}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8050}
    depends_on:
      bank-db:
        condition: service_healthy

  # --- Ticket 11 (v1.2) CDC ingestion, profile "cdc" -----------------------
  # Alternative to the "replay"-onto-Kafka path: transactions are INSERTed
  # into bank.card_transactions (init-cdc + cdc-scan enable/pump CDC on it),
  # Debezium (`connect` + `connect-init`) streams the resulting change table
  # onto Kafka, and `cdc-transformer` maps the Debezium envelope back onto
  # contract-v1 so the Spark features job / scorer / API need zero changes.

  # One-shot: enable CDC on the bank DB + bank.card_transactions, then exit.
  init-cdc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: init-cdc
    profiles: ["cdc"]
    command: ["src.bank.cdc", "--enable"]
    env_file: *demo-env-file
    environment:
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
    depends_on:
      init-bank:
        condition: service_completed_successfully

  # Long-running: SQL Edge ships with SQL Server Agent stopped, so nothing
  # calls sp_cdc_scan automatically. This pump replaces that Agent job.
  cdc-scan:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: cdc-scan
    profiles: ["cdc"]
    command: ["src.bank.cdc", "--scan"]
    env_file: *demo-env-file
    environment:
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
    depends_on:
      init-cdc:
        condition: service_completed_successfully

  # Replays the TabFormer sample INTO bank.card_transactions (SQL becomes the
  # true system of record; Debezium streams it out downstream).
  txn-writer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: txn-writer
    profiles: ["cdc"]
    command: ["src.bank.txn_writer", "--input", "data/sample/transactions_sample.csv"]
    env_file: *demo-env-file
    environment:
      <<: *pipeline-env
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
    depends_on:
      init-cdc:
        condition: service_completed_successfully
    volumes:
      - ../data:/app/data

  # Streams bank.card_transactions' CDC change table onto Kafka as
  # Debezium-shaped envelopes. This — not Debezium Connect — is what
  # `make demo-cdc` runs, because Azure SQL Edge has CLR permanently disabled
  # and Debezium's streaming loop needs the CLR-backed
  # sys.fn_cdc_increment_lsn on every iteration (verified live: connector
  # snapshots fine, then errors forever). The streamer reads the same change
  # tables and emits the same topic contract, so swapping in real Debezium
  # against full SQL Server (profile "debezium" below) changes nothing
  # downstream. See ADR 0003.
  cdc-streamer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: cdc-streamer
    profiles: ["cdc"]
    command: ["src.pipeline.cdc_streamer"]
    env_file: *demo-env-file
    environment:
      <<: *pipeline-env
      KAFKA_TOPIC_CDC: ${KAFKA_TOPIC_CDC:-bankdb.frauddemo.bank.card_transactions}
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
    depends_on:
      init-cdc:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  # Kafka Connect running the Debezium SQL Server source connector. Quay's
  # image is used (not Docker Hub's `debezium/connect`, whose tags are dead)
  # — verified to start on ARM against this compose's `redpanda` broker and
  # ship io.debezium.connector.sqlserver.SqlServerConnector. JVM start is
  # slow, hence the generous start_period.
  #
  # Profile "debezium" (NOT part of `make demo-cdc`): against Azure SQL Edge
  # the connector's snapshot works but streaming fails every iteration on the
  # CLR-backed sys.fn_cdc_increment_lsn (CLR cannot be enabled on Edge —
  # sp_configure rejects it as unsupported). Keep this service for running
  # the identical config against full SQL Server / Azure SQL, where it is a
  # drop-in replacement for cdc-streamer. See ADR 0003.
  connect:
    image: quay.io/debezium/connect:2.7
    container_name: connect
    profiles: ["debezium"]
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: fraud-connect
      CONFIG_STORAGE_TOPIC: _connect_config
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
    ports:
      - "8083:8083"
    depends_on:
      redpanda:
        condition: service_healthy
      bank-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # One-shot: idempotently PUT the Debezium connector config (see
  # docker/connect/bankdb-source.json) to Connect's REST API.
  connect-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: connect-init
    profiles: ["debezium"]
    command: ["src.pipeline.connect_register"]
    env_file: *demo-env-file
    environment:
      CONNECT_URL: http://connect:8083
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
    depends_on:
      connect:
        condition: service_healthy
    volumes:
      - ../docker/connect:/app/docker/connect

  # Transforms the Debezium-shaped change topic
  # (bankdb.frauddemo.bank.card_transactions, produced by cdc-streamer — or
  # by real Debezium under the "debezium" profile) back onto contract-v1
  # `transactions`, so the Spark features job / scorer / API downstream need
  # zero changes between "replay" and "cdc" modes.
  cdc-transformer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: cdc-transformer
    profiles: ["cdc"]
    command: ["src.pipeline.cdc_transformer"]
    env_file: *demo-env-file
    environment:
      <<: *pipeline-env
      KAFKA_TOPIC_CDC: ${KAFKA_TOPIC_CDC:-bankdb.frauddemo.bank.card_transactions}
    depends_on:
      init-cdc:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  # --- Ticket 13 (v1.3) observability, profile "obs" ------------------------
  # Opt-in overlay for either demo mode (`make demo OBS=1` / `make demo-cdc
  # OBS=1`): Prometheus scrapes the api's existing /metrics plus the
  # hand-rolled lag exporter; Grafana is fully provisioned as code (datasource
  # + dashboard survive `demo-down-volumes` by construction). See ADR 0004.

  # Consumer-lag + bank-freshness exporter (src/pipeline/lag_exporter.py):
  # kafka_consumergroup_lag{group,topic,partition}, bank_rows_total{table},
  # scoring_staleness_seconds on :9105 in Prometheus text format.
  lag-exporter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: lag-exporter
    profiles: ["obs"]
    command: ["src.pipeline.lag_exporter"]
    ports:
      - "9105:9105"
    env_file: *demo-env-file
    environment:
      <<: *pipeline-env
      LAG_EXPORTER_PORT: ${LAG_EXPORTER_PORT:-9105}
      LAG_POLL_INTERVAL_S: ${LAG_POLL_INTERVAL_S:-5}
      LAG_GROUPS: ${LAG_GROUPS:-scorer:transactions,cdc-transformer:bankdb.frauddemo.bank.card_transactions}
      # Drift detection (ticket 17, v1.5b): off (0) unless explicitly set —
      # see docs/adr/0005-model-ops.md for why this stays opt-in.
      DRIFT_CHECK_INTERVAL_S: ${DRIFT_CHECK_INTERVAL_S:-0}
      DRIFT_CHECK_LIMIT: ${DRIFT_CHECK_LIMIT:-2000}
      MODEL_DIR: /app/models
      BANK_DB_HOST: bank-db
      BANK_DB_PORT: 1433
      BANK_DB_USER: sa
      BANK_DB_PASSWORD: ${BANK_DB_PASSWORD:?BANK_DB_PASSWORD is required (see docker/demo.env for local dev)}
      BANK_DB_NAME: ${BANK_DB_NAME:-frauddemo}
    volumes:
      - ../models:/app/models
    depends_on:
      redpanda:
        condition: service_healthy
      bank-db:
        condition: service_healthy

  prometheus:
    # Digest-pinned (ticket 14); tag kept here for human reference: v2.53.0
    image: prom/prometheus@sha256:075b1ba2c4ebb04bc3a6ab86c06ec8d8099f8fda1c96ef6d104d9bb1def1d8bc
    container_name: prometheus
    profiles: ["obs"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Anonymous viewer is enabled for the demo (localhost-only stack); admin
  # login stays admin/admin if editing is ever needed, but the dashboard is
  # code — allowUiUpdates is off in the provisioning config.
  grafana:
    # Digest-pinned (ticket 14); tag kept here for human reference: 11.1.0
    image: grafana/grafana-oss@sha256:079600c9517b678c10cda6006b4487d3174512fd4c6cface37df7822756ed7a5
    container_name: grafana
    profiles: ["obs"]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  bank-db-data:
