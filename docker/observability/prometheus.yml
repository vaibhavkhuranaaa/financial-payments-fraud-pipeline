# Prometheus config-as-code (ticket 13). Mounted read-only into the
# `prometheus` compose service (profile "obs"). 5s scrape/eval keeps the
# kill-the-scorer demo beat visible within one Grafana refresh.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Flask scoring API — already Prometheus text format via
  # prometheus_client.generate_latest() (src/app.py /metrics).
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Hand-rolled consumer-lag + bank-freshness exporter
  # (src/pipeline/lag_exporter.py; see ADR 0004 for why not a stock image).
  - job_name: lag-exporter
    static_configs:
      - targets: ["lag-exporter:9105"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
